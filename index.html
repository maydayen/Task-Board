<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My Task Board</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<div class="header-left">
			<h1>My Task Board</h1>
			<span id="taskCounter">0 Tasks</span>
		</div>
		<div class="filter">
		<label for="priorityFilter">Filter by Priority:</label>
		<select id="priorityFilter">
			<option value="All">All</option>
			<option value="High">High</option>
			<option value="Medium">Medium</option>
			<option value="Low">Low</option>
		</select></div>
		
	</header>

	<main>
		<section id="todo">
		  <div class="column-header">
		    <h2>To Do</h2>
		    <button type="button" data-column="todo">Add Task</button>
		  </div>
		  <ul id="todoList"></ul>
		</section>

		<section id="inprogress">
		  <div class="column-header">
		    <h2>In Progress</h2>
		    <button type="button" data-column="inprogress">Add Task</button>
		  </div>
		  <ul id="inprogressList"></ul>
		</section>

		<section id="done">
		  <div class="column-header">
		    <h2>Done</h2>
		    <div class="done-buttons">
		      <button type="button" id="clearDone">Clear All</button>
		      <button type="button" data-column="done">Add Task</button>
		    </div>
		  </div>
		  <ul id="doneList"></ul>
		</section>
	</main>

	<div id="taskModal" class="hidden">
		<div>
			<h3 id="modalTitle">Add Task</h3>

			<div>
			<form id="taskForm">
				<label for="taskTitle">Title</label>
				<input type="text" id="taskTitle" name="taskTitle" required>

				<label for="taskDescription">Description</label required>
				<textarea id="taskDescription" name="taskDescription"></textarea>

				<label for="taskPriority">Priority</label>
				<select id="taskPriority" name="taskPriority" required>
					<option value="High">High</option>
					<option value="Medium">Medium</option>
					<option value="Low">Low</option>
				</select>

				<label for="taskDueDate">Due Date</label>
				<input type="date" id="taskDueDate" name="taskDueDate" required>

				<button type="submit">Save</button>
				<button type="button" id="cancelTask">Cancel</button>
			</div>
			</form>
		</div>
		
	</div>

	<script src="taskmanager.js"></script>	
</body>
</html>
